<router-outlet></router-outlet>

<div class="toast-container" style="position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 0.75rem; z-index: 9999; pointer-events: none;">
  <div *ngFor="let toast of toastService.toasts()" class="toast glass" 
       [style.borderLeftColor]="toast.type === 'success' ? 'var(--status-success)' : (toast.type === 'error' ? 'var(--status-error)' : 'var(--primary)')"
       style="pointer-events: auto; display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.25rem; border-radius: 0.75rem; box-shadow: var(--shadow-lg); min-width: 300px; max-width: 400px; animation: slideInToast 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-left: 4px solid transparent; background: var(--bg-card);">
    <span class="material-icons-outlined" [style.color]="toast.type === 'success' ? 'var(--status-success)' : (toast.type === 'error' ? 'var(--status-error)' : 'var(--primary)')">
      {{ toast.type === 'success' ? 'check_circle' : (toast.type === 'error' ? 'error' : 'info') }}
    </span>
    <span class="toast-message" style="color: var(--text-main); font-size: 0.95rem; font-weight: 500; flex: 1;">{{ toast.message }}</span>
    <button class="btn-icon" (click)="toastService.remove(toast.id)" style="color: var(--text-muted); padding: 2px; margin-left: auto; cursor: pointer; background: transparent; border: none; display: flex; align-items: center; justify-content: center;">
      <span class="material-icons-outlined" style="font-size: 16px;">close</span>
    </button>
  </div>
</div>
